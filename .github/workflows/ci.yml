name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: bun ci

      - run: bun run format:check

      - run: bun run lint

      - run: bun run typecheck

      - run: bun run build

      - run: bun run test

      - name: Set up Python venv for e2e tests (Unix)
        if: runner.os != 'Windows'
        run: python3 -m venv tests/e2e/.venv && tests/e2e/.venv/bin/pip install -r tests/e2e/requirements.txt
        shell: bash

      - name: Set up Python venv for e2e tests (Windows)
        if: runner.os == 'Windows'
        run: python -m venv tests\e2e\.venv && tests\e2e\.venv\Scripts\pip.exe install -r tests\e2e\requirements.txt
        shell: cmd

      - run: bun run test:e2e
