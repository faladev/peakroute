name: Release

on:
  workflow_run:
    workflows: [CI, "E2E Tests (Git Bash)"]
    types: [completed]
    branches: [main]

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    # Only run if both triggering workflows succeeded and this is a push to main
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    permissions:
      contents: write # Required to create git tags and read repo
      id-token: write # Required for OIDC trusted publishing
    outputs:
      version_changed: ${{ steps.version-check.outputs.changed }}
      current_version: ${{ steps.version-check.outputs.current }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun ci

      - name: Build
        run: bun run build

      - name: Check if version changed
        id: version-check
        working-directory: packages/peakroute
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view peakroute version 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ New version detected: $PUBLISHED_VERSION → $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ Version already published: $CURRENT_VERSION"
          fi

      - name: Update npm for trusted publishing
        if: steps.version-check.outputs.changed == 'true'
        run: npm install -g npm@latest

      - name: Publish to npm
        if: steps.version-check.outputs.changed == 'true'
        working-directory: packages/peakroute
        run: npm publish --provenance --access public

      - name: Create source zip
        if: steps.version-check.outputs.changed == 'true'
        working-directory: packages/peakroute
        run: |
          zip -r "../../peakroute-${{ steps.version-check.outputs.current }}-source.zip" . \
            -x "node_modules/*" \
            -x ".git/*" \
            -x "dist/*" \
            -x "coverage/*"

      - name: Create GitHub Release
        if: steps.version-check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: peakroute v${{ steps.version-check.outputs.current }}
          tag_name: v${{ steps.version-check.outputs.current }}
          body: |
            ## peakroute v${{ steps.version-check.outputs.current }}

            ### Installation

            **npm:**
            ```bash
            npm install -g peakroute@${{ steps.version-check.outputs.current }}
            ```

            **bun:**
            ```bash
            bun add -g peakroute@${{ steps.version-check.outputs.current }}
            ```

            **yarn:**
            ```bash
            yarn global add peakroute@${{ steps.version-check.outputs.current }}
            ```

            **pnpm:**
            ```bash
            pnpm add -g peakroute@${{ steps.version-check.outputs.current }}
            ```

            ### Download
            Source code is available in the artifact `peakroute-${{ steps.version-check.outputs.current }}-source.zip` below.

            ### Changelog
            See the full changelog at [CHANGELOG.md](https://github.com/faladev/peakroute/blob/main/CHANGELOG.md).
          files: |
            peakroute-${{ steps.version-check.outputs.current }}-source.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tag
        if: steps.version-check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.version-check.outputs.current }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping"
          else
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
          fi
